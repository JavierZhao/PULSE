apiVersion: batch/v1
kind: Job
metadata:
  name: kaushik-zz-wesad-multimae-kd-new
  namespace: cms-ml
  labels:
    jobgroup: pulse-kd
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k8s-haosu-22.sdsc.optiputer.net
                      - k8s-haosu-23.sdsc.optiputer.net
                      - k8s-gpu-2.ucsc.edu
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-GeForce-RTX-3090
                      - NVIDIA-GeForce-RTX-4090
                      - Quadro-RTX-8000
                      - NVIDIA-L40
                      - NVIDIA-A40
                      - NVIDIA-RTX-A5000
                      - NVIDIA-TITAN-RTX
                      - NVIDIA-A10
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: j-jepa-vol
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
      containers:
        - name: runner
          image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-runtime
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail

              # deps
              python -m pip install --no-cache-dir --upgrade pip
              python -m pip install --no-cache-dir --upgrade typing_extensions
              python -m pip install --no-cache-dir numpy pandas tqdm scikit-learn matplotlib scipy timm

              cd /j-jepa-vol/PULSE
              git fetch origin
              git checkout claude/explore-pretraining-architectures-cXgzI
              git pull

              DATA_PATH="/j-jepa-vol/PULSE/preprocessed_data/60s_0.25s_sid"
              OUT_BASE="/j-jepa-vol/PULSE/results_test/MultiMAE"

              FOLD=17

              KD_RUN="kd_fold${FOLD}"
              KD_OUT="${OUT_BASE}/kd"

              mkdir -p "${KD_OUT}"

              STUDENT_CKPT="/j-jepa-vol/PULSE/results/pretrain_baselines/multimae_wesad/models/best_ckpt.pt"
              TEACHER_CKPT="/j-jepa-vol/PULSE/results/eda_mae/mae_eda_teacher_for_multimae/models/best_ckpt.pt"

              test -f "${STUDENT_CKPT}" || (echo "ERROR: missing STUDENT_CKPT ${STUDENT_CKPT}" && exit 1)
              test -f "${TEACHER_CKPT}" || (echo "ERROR: missing TEACHER_CKPT ${TEACHER_CKPT}" && exit 1)

              echo "=== (3) KD: distill teacher -> student (outputs student-only ckpt) ==="
              python -m src.kd.train_kd \
                --data_path "${DATA_PATH}" \
                --output_path "${KD_OUT}" \
                --run_name "${KD_RUN}" \
                --fold_number ${FOLD} \
                --students_ckpt_path "${STUDENT_CKPT}" \
                --teacher_ckpt_path "${TEACHER_CKPT}" \
                --num_epochs 100 \
                --batch_size 128 \
                --device cuda:0 \
                --modalities ecg,bvp,acc,temp \
                --backbone legacy_multimae \
                --recon_weight 0.5


              KD_STUDENT_CKPT="${KD_OUT}/${KD_RUN}/models/best_ckpt.pt"
              echo "KD student-only ckpt: ${KD_STUDENT_CKPT}"

              echo "=== DONE (Pretrain+KD) ==="
              echo "${KD_STUDENT_CKPT}" > "${OUT_BASE}/kd_student_ckpt_path.txt"
              echo "Wrote: ${OUT_BASE}/kd_student_ckpt_path.txt"
          volumeMounts:
            - mountPath: /j-jepa-vol
              name: work
            - mountPath: /dev/shm
              name: dshm
          resources:
            requests:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"
